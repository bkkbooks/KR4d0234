body:
  text: 格齋四六别集類三宋提要臣等謹案格齋四六一卷宋王子俊撰子俊字才臣吉水人官成都帥幕嘗從楊萬里周必大遊為代草箋奏書記二人延譽于朱子朱子書格齋二大字遺之所著有史論師友緒言三松類藁諸書俱已不傳此書原本題作格齋三松集蓋猶類藳中之一種散佚僅存者朱彝尊曝書亭集有是書跋稱抄得宋本格齋四六計一百二首今檢勘首數相同當即彝尊所見之本也楊萬里嘗評子俊之文謂史論有遷固之風古文有韓栁之則詩句有蘇黃之味至于四六踵六一東坡之步武超然絶塵自汪彥章孫仲益諸公而下不論也其推重之甚至今其他文雖已湮沒不復見而此集所載四六類皆典雅流麗卓然自成一家朱彝尊亦謂其由中而發漸近自然無組織之迹以之接迹汪孫洵可無愧色矣乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書格齋四六宋王子俊撰表箋光廟登極賀皇帝皇天佑宋洊逢揖遜之朝大人繼離益茂延洪之業華夷胥悅天人大和中賀皇帝陛下聖敬日躋聰明時憲克勤克儉不矜夏禹之能乃聖乃神廣運唐堯之德自育元良之望允若神天之心屬黃屋之倦勤顧青宫而與子臣鄰環拱率百官若帝之初典禮交修輯五瑞如器乃復於皇聲實橫絶古今臣逺守偏州親見盛美雖莫陪朝著對揚天子之休第嘉與邦人謳歌吾君之子賀夀皇聖帝恭默思道乃倦于勤付託得人亟授以政再見唐虞之相繼力行曾閔之所難中賀陛下道塞堪輿仁覃動植退藏于密蓋與天而為徒怵惕以興寧以位而為樂世廓廓以無事功巍巍而不居遽興周康釋冕之心且篤長樂問安之孝允恭克讓莫匪循堯惟一執中復以命禹蔽自九重之志光于二典之書某出守偏州獲聞盛典曽是隆興之進士敢忘藜藿向日之心願祝聖人之遐齡少致犬馬戀軒之意賀太皇太后聖子神孫本源有自盛德大業揖遜相承尊歸長樂之朝喜溢靈椿之蔭中賀竊以釐降媯汭莫逮與子之謳思齊大任弗暨廣聲之世未有再見唐虞之相授躬行曽閔之所難衮冕兩朝同持夀斚車書萬國咸得歡心振古所無于今創見太皇太后柔儀天稟隂教日隆周南王化之基儀于四海明德大練之服燕及六宫蒸哉積善之祥啓乃重明之運以天子父來殫就養之勤惟地藝坤永載無疆之福臣叨承一障喜遇昌辰不惟嘉與邦人同躋仁夀之域又將推廣上意益覃孝愛之風賀皇太后堯父舜子增光虞典之書文德武功推本思齋之聖允極敷天之養式彰文母之尊歡聲所覃薄海如一皇太后仰承宸極俯盡坤儀寶老氏之儉慈率先九御流關雎之風化追配二南當上聖之倦勤挈洪圖而與子地無私載顧豈以九州四海而自居天有常親將俾之萬有千嵗而未艾此舉之懿古人所無某屬守郡符與聞盛事亦老吾老以陶錫類之風匪今斯今長致後天之祝賀肆赦厯數在躬溥萬年之景命雷雨作解洽四表之歡心凡蒙一洗之恩皆囿重熙之化皇帝陛下聖由天縱德乃日新育德春宫恪謹文王之視膳非心黃屋適逢虞舜之倦勤勉承不再之言嗣守無疆之厯蠢兹有衆孰非夀皇所養之民咸與為春俾沐嗣聖惟新之澤肆推曠蕩之典以答遐邇之心恢然天地之施生鼓以風雷之號令臣叨守下郡與宣寬恩躬遇繼離之明不私臨照喜偕扶杖之老相與謳歌光廟册后賀皇帝日有重輪已見承堯之虞舜月無私照又符興夏之塗山禮肅宫闈歡搖海嶽中賀陛下嗣膺大統祗奉聖謨于問安侍膳之餘親承慈訓俾求賢審官之助正位長秋藹然二南之風施及四方之逺臣兹焉宣化乃爾逢辰隂陽既和年穀有順成之望夫婦以正室家無愁歎之聲賀夀皇聖帝已釋重負猶深燕翼之謀俾建長秋以謹齊家之法事關九廟歡動四方陛下宅帝倦勤順天與子嘉乃丕績既深亮其有不爭功不爭能之心惠于宗上又欲使之得罔時怨罔時恫之福乃涓榖旦俾正柔儀翬翟來朝共闡聖人之孝風教所逮益隆王化之基臣出守偏州恭承明詔家道正而天下定幸當極治之朝人倫明而小民親是亦承流之幸賀皇太后天錫眉夀親見堯舜禹之傳世有徽音追配薑任姒之盛有華象服來覲慈闈皇太后母儀三朝表正九御稱觴上夀聿來冕旒翬翟之尊含飴弄孫益介山阜岡陵之福臣假守逺郡獲聞盛儀誦思齊之詩不謂適當于今日祝金母之算所願不老于後天賀皇后俔天之妹行坤順以無疆如月之恆配離明而並照事關宗社歡動華夷恭惟皇后隂教聿修柔儀允正大任京室之婦惟思媚于周薑明德大練之衣以奉承于隂后光膺寶册董正宫闈關雎王化之基載嚴正始之道既醉室家之壼永底太平之期臣假守偏州獲聆盛典職當宣化欣逢人倫正朝廷治之時氣可致祥又有隂陽和風雨時之望重明聖節賀皇帝代楊待制占長發之祥具曉天休申命之意授泰元之䇿殆非人力所致之符亶時載夙之辰對越無疆之慶恭惟陛下聰明天縱聖敬日躋受漢嶽之三呼答揚景命斂箕疇之五福敷錫庶民矧侍慈闈並受遐祉我百爾九十何啻夢齡之期心一臣三千同致後天之禱照臨所及抃蹈攸同臣身墮江湖名在簮槖望蓬萊之雲氣雖莫陪鵷鷺之班奉瑄玉于竹宫幸獲祝乾坤之算賀皇帝亦惟純佑是開震夙之祥肇錫嘉名丕闡離明之照歡騰四海若出一詞陛下舜典克從禹中允執天畀所覆是以顯生商之符日宣重光矧復纂體堯之運庸紀誕彌之旦以對無疆之休臣邈在偏州與聞盛典雖莫陪邇列奉漢殿萬嵗之觴第欲效小忠上唐臣千秋之録賀夀皇聖帝心一臣三千願紀嘉名于盛際我百爾九十蓋申景命于前規時哉索震之辰展也繼離之義陛下循堯之極蹈舜倦勤綏眉夀而及皇天克昌厥後貽孫謀而燕翼子無疆惟休逮聿崇虹渚之符兹益見龍樓之慶臣與聞盛典邈在外庸録千秋於九齡之書曾未有金鑑之作呼萬嵗于兩儀之宴會當見頡利之擒賀夀聖皇太后渚虹啓聖光開萬世之休瓜瓞生民殊非一日之積瞻言此舉厥有自來殿下應地無疆後天不老周薑思媚馴致武王之生有娀方將是開相土之烈親見神孫之嗣服載光初度以錫名臣假守孤城兹逢盛旦不但喜箕疇之福敷錫庶民又將賦周頌之篇亦右文母賀夀成皇后重離明而麗正丕昭繼照之期履帝武而敏歆實肇生民之福粵惟顯號侈乃昌辰若稽積慶之源休有發祥之自殿下表正九御母儀兩朝太姒嗣徽音本支百世王母坐少廣夀考萬年肆令節之紀名亶慈闈之燕喜臣兹焉乘障乃爾逢辰雖未紀唐臣之風來上十篇之事鑒所幸託虞帝之化以得萬國之歡心皇子降生代楊誠齋賀皇帝穹祗隤祉將延洪過厯之占弓韣應祈庸對越承祧之任事關九廟歡洽四方陛下靈承天心駿惠祖武民胥嘉靖皆效華封之祝堯神無怨恫靡俟髙禖之祠漢篤生元子式應熙辰臣不謂凋年見此遐福身雖老矣子孫與有于榮懷心實欣然手足不知其舞蹈賀太上皇帝聖人退藏于密決焉與子之謀上帝申命用休祚以抱孫之喜人胥相慶情不自勝陛下文顯丕謨湯垂後裕巍巍蕩蕩自晦則天之功名穆穆皇皇誕啓宜君之孫子篤生岐嶷之質益固延洪之基永孚邦休顯有祖烈臣官縻荷橐職在祝釐無疆惟休豈但為熙朝之賀不顯亦世又以假後裔之靈賀太皇太后於皇景鑠啓乃承祧之英長發靈源亶惟積善之慶仰止無疆之夀見此滋至之休下逮遐荒舉同抃蹈中賀竊以有娀立子不聞宅至養于四朝明德弄孫未有閲元嗣于五世赫是盛美曠無前聞殿下厚德郅隆徽音逾永備時五福坐享萬年之期寶是一慈隂格三靈之佑肆裒嘉慶以啓元良穹昊俾昌兹復見天子之子遐齡未艾更將抱元孫之孫臣逖聞榮懷冞深欣舞雖奉瑄是職乃不待髙禖之祠第擊壤攸同以自慰華封之祝賀皇太后天惟純佑嗣開萬世之休神罔時恫殊非一日之積瞻言以喜厥有自來歡聲所覃薄海惟一殿下柔嘉維則淑慎其儀母慈婦順之兼隆軼于今古人心天意之叶贊施及後來相時主鬯之歡想見抱孫之喜某官維持槖職在祝釐無疆惟休豈但為國家之賀不顯亦世又以假子孫之靈賀太上皇后月無私照方助成與子之謀星有重暉乃不負㺯孫之願慶關九廟福萃重親殿下應地無疆後天不老周薑思媚馴致武王之生有娀方將是開相土之烈親見神孫之岐嶷郅隆寶祚之熾昌臣墮在山林踐修香火不但起華封之意請祝聖人又將歌周頌之篇亦右文母賀皇后坤元底順昭格三靈之休震索發祥上關九廟之慶照臨攸暨抃蹈丕同殿下外惠宗公內隆隂教神罔時怨有開熊夢之占天惟顯思于赫龜圖之福肇允元良之望實覃岐嶷之資邦永孚于休民亦職有利臣身雖在外喜則由衷稽首漢殿之觴雖莫參于鵷綴傾耳堯門之瑞實深激于葵心孝宗大祥代楊誠齋慰皇帝鑽燧洊經于改火尚深追慕之懷彈琴未忍于成聲勉徇祥除之制陛下皇圖是荷祖武斯繩一日萬幾率循兢業之攸訓三載四海實均遏密之至情逮兹即吉之辰諒有無窮之感願蹈立中之制益光潤業之傳慰太上皇帝嵗籥洊更恍如過隙祥琴甫御慘不成聲勉遵改服之期未憖終身之慕聖安仁夀皇帝陛下繼文廣伐蹈舜倦勤三年稱情而立文下徇居廬之禮百官承式而稟令因決與子之謀逮此既祥之餘猶有愈遲之痛願抑情文之感式慰臣子之心慰太皇太后逝川沄沄悵仙逰之莫返閲日鼎鼎恍嵗律之再周悵然餘恫蹈此中制殿下情鍾慈極仁惻宸衷萬乘天臨緬懷法駕之致養三年電過忍聽祥琴之成聲惟深思禮制之有終以益介夀昌于未艾肆令宇縣永有母儀慰皇太后望蒼梧之峯愈覺音容之逺推黃道之日再見經躔之周尚深送往之哀勉徇荐祥之制殿下性鍾地順痛切天榷錦欲衣而弗安何意亟陳于象服禫雖垂而勿樂忍聞復奏于霓裳撫綴衣而增懷感流光而永歎惟兹臣庶皆蘄慈抱之少寬俾爾熾昌以相遐齡于有永慰太上皇后日月其除奄暨荐祥之制琴瑟在御肇開遏密之音亶時至情尚有餘慕殿下母儀寰宇婦順厯年佳婦佳兒永懷昔者之付託厚恩厚報忍即今兹之祥除諒深追孝之悲猶濺感時之淚願體復生之節庸肩介夀之期慰皇后日月逾邁奄易服以荐祥雨露既濡尚感時而濺淚餘恫未憖寰宇丕同殿下夙謹柔儀共宏孝治三聖相授一道隂相九重之纂承四海遏密八音已畢三年之禮制願抑無窮之感以綏滋至之休郊祀代黃竹坡賀郊祀禮成嚴恭自度罄丹扆之純誠緼豫為紛輯紫壇之熙事四方來賀萬福攸同協氣塞乎堪輿歡聲搖乎海嶽陛下聰明時憲聖敬日躋肇新萬化之原敷錫庶民之福夕烽息警人皆耒耜之氓秋稼登場家有倉箱之積載念降康之自聿嚴報本之祠多士駿奔贊丕天之巨典千童羅舞陳昭代之彌文咸秩百神大賚四海臣久違北闕隔在西陲涓選休成幸獲再逢於盛際肅雍顯相莫繇一覩于祲容第偕扶杖之民同泳漏泉之澤賀郊祀肆赦蕆儀吉土敬共三嵗之祠肆眚端門敷錫庶民之福渙發風雷之號沛為雨露之仁凡在照臨舉同慶賴竊考聖人之饗帝蓋承天意以惠民隤祉發祥具獲靈明之博貺赦過宥罪是覃汪濊之湛恩陛下道冒堪輿恩柔動植邉鄙不聳皆為來王來享之人年穀順成復見多黍多稌之世爰對一陽之律載祗八陛之壇昭升於天聿嚴熙事有秩斯祜燕及函生臣墮在逺方獲聞盛舉莫陪多士執籩豆以駿奔第與逺民想笙鏞而獸舞册太子代竹坡賀册皇太子春宫二極有開震索之祥寶册揚庭庸鼓巽申之號慶關九廟風動四方陛下堯大難名舜恭允塞天職覆地職載莫喻休功月重輪星重暉蓋圖大計眷乃承祧之重居無在傅之勤爰涓選于剛辰俾光膺于殊禮臨軒出令示一人有慶之符主鬯得人兆萬世無疆之福照臨所逮頌詠惟均臣昔參綺皓之遊今辱嚴徐之侍靈源暨逺子孫與有于榮懷抃悃發中手足不知其舞蹈進書代進光宗御集雲漢為章莫閟寶儲之彩風雷作號俾翻金匱之藏勒成一經昭示萬世中謝竊以聖人肆筆初何意于成書天下觀文乃有功于範俗繫隆昭代遹駿先猷恭詔編摩之臣彚列昭回之次煥然可述施及無疆恭惟光宗皇帝學富月將聖髙天縱得書之體得言之解上掩百王如日之升如月之恆下飾萬物疇昔燕間之御從容翰墨之場周文郁郁乎宏賁盈成之治虞書渾渾爾丕昭精一之傳陛下聲欲廣文道能繼禹作者之謂聖敢忘繼志述事之心得其所以書洞見經天緯地之妙肆命臣工而纂緝載揚帝典之光華緗帙縹囊寶為大訓赤文緑字皆聚此書臣等猥以謏聞膺兹隆旨玩嵗愒日空殫淺見于管窺血指汗顔深覺聖言之天逺代進重修七司令制而用之謂之法所期合古而便今變而通之存乎時當亦舉偏而補弊立為成憲允屬昌辰肆令億兆之心具曉畫一之意中謝竊以著為律疏為令要皆所以範民作者聖述者明亦共圖于經世必揭始觀之象用陶不倦之民以時纂修為世檢押陛下堯綱具舉舜法可傳左規右矩前凖後繩以為民極詳法略則本數末度則有司存粵從寶厯之紹承咸仰聖謨之宏逺五服薄四海臂使指而畢從八統御萬民網在綱而不紊猶恐弊生于所忽殆將功敗于已成爰制詔于臣鄰俾科條于令甲布在方册允釐百工鳬居鴈聚之浩繁同歸于治金科玉條之明白可舉而行勒成一代之書庸示九圍之式臣等賦材謭薄庀職凌兢繼晷窮年空玩嵗日而何補奉命承教乃得聖王而為師維幸及于奏篇猶未知于免戾雜謝代湖北憲謝到任剖符起廢已愧僥踰持節觀風又叨臨遣星言于邁夙次所臨伏念臣草芥人微斗筲器小紳笏三十載何有寸功風波千萬端止欠一死曩丞棘寺出守山城讒言驟興政坐過客厨傳之故公論既定復見中天日月之明方拜命于州麾忽疏榮于指使惟是重湖之外實連三楚之區民雜蠻猺地控邉鎖渺焉蒲澤之深阻甚者潢池之繹騷自非酌寬猛之宜是必負澄清之寄有如抗拙曷稱使令兹蓋伏遇皇帝陛下蹈舜好生傳湯祝網欲妙按臨之選以將欽恤之仁謂使過賢于使功將觀後效而聽訟不如無訟何必能聲臣敢不循行郊原延見父老道上德意俾各懷自愛之心問民戚休勿使有多暴之俗代謝賜厯日居卿底日雖古人厯象之常後天奉時乃聖主彌綸之化惟時頒朔于以授民星正仲春不失省耕之序陽居大夏仰體好生之仁承流之臣撫心知幸中謝恭惟皇帝陛下循堯之道行夏之時履端歸餘上斡周天之度務農重穀下底蒸民之生肆于正嵗之初嚴乃清臺之課布在方册允釐百工臣敢不布宣寬書勸相農畝諭以上意靡容帝力之不知寬其力征抑使農時之無失知成都謝到任代竹坡先生黃疇若應蜀中文字並同掌邦教于邇聨疇庸弗效殿帥藩于逺服聞命若驚亟懷綬以遐征已褰帷而涖止具以朝廷寬大之意告諸田里愁苦之民中謝伏念臣一介妄庸半生艱苦飢寒不恤姑為投牒覔舉之謀州縣徒勞不作結綬登畿之夢試邑偶逃于吏議入京遂厠于朝行嵗月推延馴至上當于言責風波橫潰幾何不蹈于禍機保全迄賴于皇慈獻納晉升于禁路奉雲陽之瑄玉莫輸許國之忠問杜曲之桑麻漸起歸田之興屬廟謨之經逺移制幕以改絃掖垣忽誤于出綸井絡遂從而分閫蕃錫有加于彞典察廉旁暨于鄰封仍疏次對之恩增重十連之寄寵逾深而莫報責愈重而難勝陛下天拱一堂子來萬宇不泄邇不忘逺要皆如出于京畿在知人在安民是以不輕于牧守不責催科之巧寧無悃愊之華亶時純愚蒙此臨遣顧惟四境頗異平時內而閭閻凋瘵之弊深外則羌獠招懷之道闕一龍蛇一赤子人謂斯何為保鄣為繭絲䇿將安出豈繄綿謭所克堪任臣惟當精白一心展布四體既庶矣加之富矣願遵洙泗之言欲安之非以勝之或收渤海之效謝安邊所結局轉官幣餘制用偶逃曠職之誅詔旨疏榮忽冒茂官之典寵光所逮震疊靡寧伏念臣頃汙朝行適尸言責謂迷國之渠已去死有餘辜而和戎之利復成責將安出要當取沒入之産以定為聘好之常勾稽下及于至微滲漏靡容于它罅不圖管見辱被帝俞亦令微臣忝董乃事迄有涓埃之補稍符糞土之言皆由聖主聽納之明是能底績至若有司出納之吝何足言勞敢圖湛恩肆陟彞典陛下馭周八柄勵舜庶明謂善至小而不遺乃能示勸賞或疑而從豫所以廣恩雖去國以遐征亦升華而下拜臣敢不推廣此意撫摩所臨節用愛人庶圖田里富足之效畫圻固守抑體廊廟招懷之心謝宗祀禮成加封邑合宫蕆祀奉瑄莫與于駿奔溫詔疏恩錫羡頓增于邑入驟膺寵渥莫喻凌兢伏念臣奮自閭閻偶靡簮紱不稼不穡豈宜多取于禾囷是蓘是穮第欲歸安于農畝密邇一純之薦適為萬里之行不圖釐事之告成亦衍畬田而拜賜陛下心存寅畏德務寬仁堂秩几筵極天地鬼神而昭格恩覃四表舉輝胞翟閽而不遺肆令微臣亦叨大賚臣敢不仰銜厚施俯究愚衷因遨逰以省耕無非事者罄勤拙而盡瘁不素餐兮謝加龍圖制因任分閫罔功恐坐黜幽之典出綸有命忽叨進律之除是何宜斥而反遷籍甚以榮而為懼牢辭不獲重拜靡遑伏念臣蚤竊儒科晚塵禁從民曺經幄殊深非據之慚松徑菊籬屢起歸休之夢偶值龜城之謀帥俾承芝詔以充員屬干戈甫定之餘而杼軸已空之久雖勤拙相補里閭稍稍安之然衰病交侵精力駸駸憊矣方上祝釐之請敢圖錫命之榮誤恩俄被以龍光寵秩載騰于鳳檢幹方井里已寬廷尉之誅候對松階更冠寶儲之首陛下天臨廣宇子視逺民察知几案之小材實維簮履之舊物雖政拙自注下考僅輸撫字之勞而賞疑所以廣恩式彰忠厚之意但臣駑材素下鼠技已窮深虞末路之難併使前功之廢敢不益鞭其末圖謹厥終抖擻精神勿蹈虧功之戒逍遙田里終期從欲之仁謝平蠻轉官反獠告平僅塞幹方之責恩綸驟至例疏進律之榮循墻莫遂于牢辭蹐地不勝其隕越臣頃承巽命出帥坤維封陲逺控于三邊憂責獨深于諸道稽小醜干誅之故狃積年弛備之餘爰飭所臨俾固吾圉先為不可勝蓋守臣鎮撫之常則莫我敢承亦廊廟威靈之素以至師徒之薄伐又皆將士之宣勞如臣之愚何力之有乃拜九重之睿渥使升一等之文階僥踰若斯報稱安所陛下如天覆幬若日照臨逹虞舜之四聰而靡有遐遺謹周王之八柄而不容幸與察臣雖無善最或能嵗訃而有餘欲臣少慰窮塗是以賞疑而從豫肆頒恩施以賁衰殘臣敢不仰體隆私益圖末路龍光所逮固當更效于糜捐鼠技已窮終冀退安于間散謝加直學士再任遐陬分閫踐更久過于瓜期邃閣升班申命復煩于芝檢山川如舊寵渥惟新循墻力控于忱辭出綍莫回于成渙伏讀溫詔益震危衷伏念臣結納無竒侵尋已老入持禁槖論思莫效于嘉猷出帥藩方撫字第勤于拙政方凋瘵瘡痍之未復嗟勞徠安集之良難雖几案粗材或謂頗堪于煩使而蒲栁弱質其如已迫于凋年曩嘗力控于封章止願退安于間散乃俾解裝而承乏且蒙進律以疏榮日往月來倐已復周于嵗籥心勦形瘵惟憂寖蹈于官針投誠方竊于丐歸有識咸譏其已晚敢謂峻除于寶庋居然就撫于油幢深虞併廢其前功無以仰承于睿渥陛下天臨百辟器使群工欲使蠶叢魚鳬之區如在豐鎬鄠杜之側肆綏逺服重簡淵衷謂道州之考何長姑令撫字而許丞之聾不去可免送迎亶時頽墮之蹤假此斯須之寵臣敢不恭承明命罄竭謭材老馬力疲末路分甘于伏櫪窮猿意迫歸心第切于投林謝東宫贈金杯纈羅香茶令出震維念屨簮之遐棄恩施晉錫旅器幣以下頒偕寶薰名焙之多假暮景窮途之寵整襟下拜刻骨靡忘伏念某飲則一瓢衣維百結身縻朱墨無心燕寢之清香夢繞家山雅意故園之雙井賜豫忽來于天上芳珍敻絶于人間妻孥羅拜以感藏父老聚觀而讚歎殿下誠存泂酌善取緇衣奉鬯陪祠休有惟馨之德問安決䇿居多有味之言尚憐流落之蹤首辱從遊之舊爰下便蕃之貺俾為衰晚之光某惟當沉酣隆私被服嘉惠祝萬年之遐算誓將求香火之祠生兩腋之清風更兾適山林之願報將安所言莫能宣宰相代賀留右相正伏審大廷渙號亞輔疏榮士勱相我國家豈輕其選王置諸其左右今得其人綸言一頒國勢益壯某官道隆而德備才巨而能全解牛十九年而殊不更刀溜雨四十圍而曽無改節不為俗學再還慶厯嘉祐之風自結主知早侍上清虛皇之側舍人樣生光于鵷鷺尚書履徑上于星辰入殫論思獻納之忠出課慈惠循良之最隨其所到休有可書朱簾捲雨畫棟飛雲盡領洪都之勝連峯去天枮松倚壁不辭蜀道之難召諸天梯石棧之間參乃鈞府樞廷之二載調元化益峻岩瞻蓋方其左朱轓之時已繫蒼生之望逮此右臯陶之選皆歎白麻之遲風雷之號一傳天人之心交喜不動聲色固已見嵗時無易百穀用成益究設施要當使鐘簴不移廟貌如故某寸長何有一障是乘嘉與闔境之人同囿洪鈞之化使民安田里其孰非吾君吾相之恩政拙催科殆必免大譴大呵之域代賀史丞相轉光祿大夫進封魯國公恭審孚號大廷疏榮顯渥刺經作制勒成皓噩之書胙土苴茅奄有龜蒙之境仍稽故典峻陟文階金章式煥於民瞻采地增陪于邑入册命一下歡聲四馳恭惟某官道冒古初功存社稷洪鈞轉一氣乾坤日就于清夷庶績撫五辰星宿亦為之明潤自贊解絃之化益隆調鼎之勳年穀順成和氣旁行于農畝逺人咸慕夕烽不到于邉城坐令薄海內外之人如在先朝全盛之世爰輟秉鈞之暇定為畫一之規合古便今可通行于萬世舉綱撮要以明示于黎元爰涓選于良辰庸徹聞于黼扆肆覃茂賞載答顯庸登進厥民在王庭俾聞播告永弼乃后于彞憲勿替欽承嗣膺維師尚父之尊有光先正保衡之烈某心馳恩地迹滯侯藩靈丹就而雞犬俱仙敢萌榮望大厦成而燕雀交賀空激抃悰頌詠彌勤科條莫既執政代賀王參政藺伏審光膺宸渥參秉政機黃屋倦勤豈遑暇世間之機務紫芝錫命乃登庸天下之正人豈非燕翼子之謀莫先求哲人之舉臣有十亂武維用此而有餘才如八元堯自相之而何害儻用儒之已盡斯釋負以無憂亶惟我公能任是責某官才全而能巨志大而氣剛酹柱獻棟梁之規人為之懼披腹呈琅玕之藴天亮其忠其在甘泉持槖之班已有傅巖調鼎之望頃從專閫促以賜環方班聽履上星辰之聨遽參濟川用舟楫之地進則云驟人猶恨遲然而受隆委于兩朝下丞相之一等雖羣賢並命期共賡股肱庶事之歌然輿論所宗乃獨任春秋賢者之責元氣孰壯隂沴孰消樽俎笑談何以折遐衝于千里之逺日月獻納必將舉明主于三代之隆在此位而不為顧他人而何望公之自起庸可或輕某雅嘗辱知不敢私賀所願獲見勳烈有如青史之所書則雖墮在江湖至于黃馘而奚憾臺諫賀金察院伏審光被宸恩擢司風憲雷行鳳檢方進登天下之正人霜肅烏臺俾盡吐胸中之素藴雖俯從人望實斷自天衷郵傳歡動于四方國重頓增于九鼎恭惟某官髙文作古雅望鎮浮庖丁之刀十九年綽有餘地孔明之柏二千尺誰識苦心政所去而見思材無施而不可頃自流錢之府往儀振鷺之羣子襟青青士有文武兼資之略王臣蹇蹇帝思風節不撓之英遂飛渥于楓宸俾察廉于柏寺邦朋屏迹雪見睍而自消善類寧居虎在山而不採顧念雖資于彈劾亦難久屈于徊翔風采凜然今已杜羣枉之門而開衆正之路鈞衡近止行當建萬世之䇿而舉三代之隆某猥以諸生伏讀明詔身雖老矣恐無芝􅌲蒸出之祥心則欣然猶有雞犬俱仙之望抃蹈何極敷陳莫殫賀鄭正言除司諫伏審就陟諫垣頓增國重皂囊奏疏尚參兩省之聨黃紙除書遂正七階之品人徯仁言之溥士知元氣之還贊書一傳輿言具穆恭惟某官修名蓋代厚德鎮浮金鐘大鏞殆非近世之人物光風霽月綽有前輩之風流孤忠上簡于龍光清貫亟躋于鷺序冠峩豸角隂見睍而已消手批龍鱗木從繩而自直屬時睿哲渴想忠規乃眷廷紳孰任盡言之責肆揚詔綍延登已試之英即疇底績之庸行正告廷之命某猥分閫寄遙聽除音聞鳴鳳于朝陽豈為私賀寄雙魚于尺素宜激抃悰賀董祕丞除正言伏審光奉制綸擢居諫省道山委竹帛已盡紬四庫之書閶闔呈琅玕乃進立七臣之列帝虛心而垂聽人側耳以竦聞渙號一傳師虞具穆某官髙文作古奧學造微著玉杯繁露之書淵源逺甚翻金匱石室之作譽處翕然肆疇册府之英無出儒宗之右鵬摶羊角雖莫量邁往之程鳳鳴朝陽要先展格心之業諒悉攄于賢韞以入告于辰猷坐令州縣之民如在祖宗之世君子有所恃小人有所忌蔚為百辟之儀諫官可盡言宰相可盡行即兼二者之美揚庭之寵指日以須某雅辱舊遊喜聞佳語賀厦欲同于燕雀莫遂下風寄書逺託于鱗鴻未殫抃悃制閫代通安大使丙身無功狀難久汙鵷鷺之班帝有恩言俾往牧魚鳬之國出國門而東騖厯吉日其遐征惟遙瞻大幕府之宣威竊自比小諸侯之述職蒙成庶其免矣馳敬其敢後乎恭扣私門具陳忱悃伏念某學不適用材亡踰人身類蠧魚生死不離于文字心如斥鷃飛搶止在于枋榆不圖官職之推移浸被朝端之任使謀猷何有誤置屬車豹尾之間志願無它已作間館珍臺之夢偶值坤維之謀帥爰奉巽命以充貟靖言差擇之所由非有勞能之可録意其溫恭有恪必能寅奉于教條察其悃愊無華或可惠綏于田里肆加臨遣俾備驅馳自知不稱于所蒙其若牢辭之弗獲某官受天間氣為國重臣手剪逆儔帶礪遂盟于偉績身當強敵金湯不在于長城相時社稷之大勳式簡冕旒之隆眷徒得君重託西陲半壁之天行以公歸扶黃道重輪之日尚憐孤拙曲借優容隂雨之膏黍苗深切喣濡之望廣厦之庇寒士不勝歸倚之私頌詠良勤敷陳莫究安撫賀龍興帥趙龍圖善俊伏審光奉綸言移牧會府課殿邦之最謂宜置諸左螭右掖之班宣制閫之威乃獨領此南浦西山之勝雖小鬱輿人之誦而坐回一路之春側聞除書幾至曲踊某官自天育秀以學禔身河間大雅不羣所耽者古東平為善最樂自得于心早摶九萬里之風薦試十九年之刃隨其所到輒有能聲疇清香畫戟之庸久膺選表寓寶文緑字之直奚足酬勞頃于龍焙之濵益播熊轓之譽一襦五袴萬口一談適大江以西謀帥之難而當今之選非公莫可畫棟飛雲朱簾捲雨端為湖山而一來橫門開日髙閣切星行厲雲霄而却立某欣聞聲猷積有年數幸甚部刺史班春之始得在小諸侯述職之中無一事以勤館人空有懷滕閣之記如百穀之仰膏雨苐請賦黍苗之詩時哉千騎之臨正肅春光之麗幸無忽節宣之令實不勝頌詠之私代王憲通荆南帥王樞使藺起家乘障在初心猶切于吹虀改命觀風不自意何從而得鹿望寧到此賤不獲辭式時方伯連帥之賢實惟紫樞黃閣之舊屬嘗有一日之雅諒不忘平生之言小草之依長松亦緣同味之故凌雨之得大厦厥有亢身之方願卒相之其知免矣某官材全而能巨志烈而氣剛立朝堂堂真不清之氷雪論事凜凜乃羣枉之鷹鸇羽儀百僚夷險一節濟川作礪不負武丁之簡知破斧缺斨亦豈周公之加損起從詞館來殿帥藩以方叔之壯猷勤畢公之小物一路綿邈皆自得湖山之民重湖阻深無復有􅍉蒲之盜行錫昕朝之對遂登顓面之崇某以碌碌何足數之才蹈硜硜未必全之戒不圖末路俾駕使軺幸列城已熟于教條而百姓亦安于田里蒙成足矣雖衣繡持斧以何施馳情炯然惟補劓息黥之是望通賀安撫王侍郎伏審出綍西垣作藩南服紫芝塗檢方除言語侍從之臣潢池息兵所要詩書禮樂之帥姑輟孔鸞之侣來空猩兔之羣寬九重之顧憂為一路之司命某官學窮聖韞材應時需懷明月佩連城自全其貴羞崑崙薄員嶠莫喻其髙惟其已重而物輕是以身退而名進頃際解弦之會實資曲突之謀亟其空臆以盡言翩然納履而遽去閲時浸久忽公論之復明承詔來歸舉國人而胥慶方徯正人之巨用遂躋寰海之隆平適時群醜之陸梁俾蒞十連而鎮撫親屈元戎之乘併紆支郡之符先聲一臨士氣百倍昔西羌未定范文正出以守邊而貝州既平文忠烈歸而拜相對于前哲是在我公凱歌才偃于旗於嵗旱即為于霖雨某羇孤一介流落百罹雕蟲篆刻乃壯夫之不為既無遭于場屋豫章橘柚非老人所宜種又絶望于榮塗歸歟松竹之遊已矣風雲之夢不圖疵賤之蹤迹何自徹聞于縉紳外之部使者誦言其平生欲以為山林之勸內之卿大夫表出其所著姑少酬鉛槧之勞方糜斗食于祠庭俄捧辟書于蜀道捫參厯井不勝行路之難披霧覩天乃失摳衣之便惟是子雲之宅尚編渤海之氓近得鄉里故舊之書具言父母豈弟之政為黎侯之賦逺景雖云未卜于歸期從童子而歌中和亦能遙頌于風化其為歸倚莫究宣陳賀潭州衛參政涇伏審勉從溫詔起殿價藩衮衣繡裳尚鬱歸禾之命櫜兜戟纛有嚴制閫之權坐令道林嶽麓之間俱在春風和氣之內某官道關百聖忠貫三精該孟韓于胸中獨傳正學起朝董于筆下遂甲大廷屬昕朝更化之元在獨坐可言之地如農夫之去草先務絶其本根若嵗旱之作霖爰置諸其左右方徯登崇而顓面忽投間散以均勞逮元氣之稍回果公論之自白赤舄几几曾何跋疐之傷方城臨臨忽畀藩宣之化邈是瀟湘之境方罹蛇豕之妖瘡痍未瘳反側猶在勞來安集暫煩天子之大臣輔贊彌縫行究賢人之逺業某切聆明詔倍激抃悰齒豁頭童猶是陶鈞之舊物文卑書俗空陳竿牘之具文恭維嵗律之向除殊覺寒威之未憗願精調于鼎鉉即歸秉于機衡蘄向良深科條弗究漕使通潼川漕謝太丞代胡監酒青衫試吏方謀控地之飛繡節觀風幸快披雲之覩撫微軀而浩歎捨崇仭以安歸伏念某鉛槧庸生箕裘冷緒焚膏油而繼晷敢或怠荒居陋巷以致誠自甘窮約顧惟族繫俱業詩書走馬看長安之花後先相繼攀檻請尚方之劔風烈猶存自憐駑質之無堪長恐家聲之之弗嗣屬興能于鄉老偶䇿第于春官披腹而呈琅玕了無可採排雲而叫閶闔咸笑其狂福寧望于庸庸科遂收于下下旋以擕孥于甥館逝將賦粟于坤維雖弛擔之逾時曽擇栖之無所烏鵲繞樹悵三匝以何依鷦鷯巢林得一枝而已足不有賢德其誰主盟某官道覺先民文追古作吕梁飛水三十仭盡供筆下之濤瀾廟柏溜雨四十圍獨傲嵗寒之風雪頃者郅隆于朝望居然垂上于政塗興懷忽急于遊山丐外遂從而懷綬羞崑崙而薄員嶠公則良髙扶黃道而上紫微世將誰屬佇看召馹歸翊政機惟時水漕之小淹尚有銓衡之可託倘辱置門人之數實足慰平生之心矧大賢何所不容而君子不可得侍兾獲聞于一語以為法于終身斷臂雪中諒不靳真傳之祕漆身橋下其敢忘國士之知歸倚良深宣陳莫究通成都林運使白頭捧檄泝瞿塘灧澦以遐征繡節觀風許櫑具步搖而入見矧是萍蓬之迹實連桑梓之隂陽公薰晉之鄙人亦復何殊于親炙孔子思魯之狂士固應頗喜其逺來是不虛為萬里之行其庸敢廢一箋之敬恭惟某官修名揭日髙誼薄雲斯文得所宗典則在元和之上所守一于正風流如慶厯之間稽其踐揚休有譽處屬者一麾之出守藹然五袴之興謡選表來歸謂即近長安之日乘軺于邁乃遙占蜀道之星惟干戈甫定之餘正杼軸已空之候雲屯萬旅曽無賦斂之少加星拱九霄聿有聲猷之上徹行拜芝泥之璽亟歸玉筍之班某困頓數竒侵尋已老蹭蹬場屋其誰以弔于有司流落江湖已久無求于當世不期特詔録以微官身縻香火之祠夢繞蓬蒿之宅耕雲釣月自分終焉厯井捫參何心到此偶故舊軫綈袍之念而薦書形華衮之褒遂扶老擕幼而一來蓋蹈險履危之萬狀撫頭顱而浩歎初亦憮然悔之望英簜以焉依兹又幸之大者其為歸倚莫究名言提刑賀李崇慶得鄉節􅌫伏審揆日建臺出節引道猩鼯夜嘯上貽廊廟之憂錦繡晝行中出璽書之寵仍寓寶儲之直益增英簜之華一聞郵置之傳頓覺封陲之肅恭惟某官夙登列著力障頽波趙孟所貴能賤之于吾何有孫劉不使為公耳枉已則非流落十年險夷一節疾風知徑草身自有于長城浮雲蔽太空世苦無于公論逮兹更化詭以作州藹然治最之旁行久矣召環之當至殺越人于貨適值小夷干紀之秋修扞我于艱尚憶曩嵗幹方之略肆疇物望就駕使軺賁延閣以通班過故鄉而上冡昔儂冦叛而安道率家僮破賊貝州平而寬夫以相位酬庸參本末于兩公殆前後之一轍式是恩綸之下拜居然天意之偶開適于是時忽降甘澍衛師興而致雨已示洗清小醜之期商嵗旱而作霖又卜歸服大僚之兆某情均骨肉迹阻門墻櫑具步搖反莫偕于賀客距躍曲踊苐深激于抃悰代回利路毛提刑兼制參午切審光膺睿渥就按祥刑下芝詔于西垣寵光茂甚泛星槎于南鄭風采凜然不妨大幕之運籌併使全蜀之蒙福成命一布歡聲四騰恭惟某官厚德春溫貴名日起曩鬱朝天之步來為贊畫之賔留東閣以觀賢小淹遐武觀湖南而知客遂簡淵衷肆令咨度于皇華悉俾平反于丹筆佇承迅召歸正要津某耳熟風猷神馳德宇能令公喜能令公怒曷勝借助之懷不自我後不自我先適值建臺之日欲陳賀悃莫究抃悰提舉通鹽使鄭侍講喬代曽宰伏審輟從朝班出將使節誦文章之爾雅殆疑非近世之人望英簜之光華乃辱在先驅之役蓋平日精誠之感有今兹幸會之逢不自勝其欣抃之懷輒自見于竿牘之敬某官彌文作古雅望鎮浮方其遊舉子之場已不為嫓青配白之語及其奉彤庭之對乃盡吐薄雲貫日之忠溫然有説命三篇之風巋乎在漢庭諸老之右式是帝心之簡在亟從天祿以校讎厚德有容而不失其髙中立不倚而非期于矯頽波方靡雖蕭傅亦有非望之慙砥柱不移獨宋璟聿為難致之客深交不願于綘灌為公何有于孫劉旋剸劇于星郎之曹且翻經于春官之席皆主知之自結何治最之弗優大為人望之攸歸僉謂國鈞之伊邇奚雲霄之已逼乃原隰之載馳先聲所孚列城自肅羞崑崙而薄員嶠姑遂來臨扶黃道而上紫微終當未免某少而筆硯偶爾紳裳倒指半生之中若為把玩折腰百僚之底乃爾塵勞矧承竭澤之餘尚深赬尾之憫催科撫字莫知何䇿以兩全噓濡拊摩尚圖更僕而三請幸焉已甚言亦奚宣郡守代回建昌江守自任駕行春之馬何至煩公分掃地之光是將及我寶鄰之側有人如此魚書之敬闕典可乎競為所先可謂不敏某官英標玉立雅望川流解牛十九年綽有餘刃參天二千尺誰識苦心稽其所臨具有可紀尚屈雲霄之步來分銅竹之符解弦已妙于更張禁火便從而安作然而先一州而後天下豈吾相心潤九里而福京師非異人任諒無暖席即有賜環某家連賜履之鄉官託輔車之勢故于五袴之詠尤所飽聞藐是七襄之章焉能盡寫代回鄭贑州汝諧已試疇庸維良作牧籍甚物望謂宜置甘泉之班邈是侯邦豈其淹長者之辱維時鄰境首丐餘波自送旌麾之南日困塵埃之迫亦欲致魚緘之敬以踐修燕賀之懷竟為所先敢謝不敏某官長材緯世雅望軼羣粉省含香早出應郎官之宿江城畫諾乃洊開刾史之天亶維責實之朝欲示重外之意復煩遐躅加惠價藩恐行促于追鋒殆不容于暖席某偶冒分符之寄實連賜履之邦披雲覩天屬已慰生平之願掃地布席政有賴輝映之餘拜嘉以還占言莫究代通楊筠州誠齋得請于朝把麾于外首石渠之選人猶為之屈稱剌斗大之州今乃煩于敏手提封幸甚輿誦謂何某官其學一出于誠雖天亦亮其正每極言髙論曽靡悼于後害雖怨家仇人不敢誣其生平世亦豈無名流若此者幾古之所謂遺直顧不在公雅薄圓壺之遊自詭左轓之駕藹然儒者之政薰此區吳之民厥惟當今尚有公論頃收朝迹壞麻誰貸于延齡比入薦書登位蓋慙于陳實夫豈為丹雞之詛亦自逃青史之譏以此占之豈久外者某朅來乘障政爾事賢屬聞有行不覺永歎念逖間德宇何從聞拔薤之規而講問政聲尚欲取伐柯之則代誠齋迎賀趙守希仁出綍西垣分符南服採諸人望久當置紫槖之班邈是江城乃復枉朱轓之辱匪緣重外何至煩公先聲一臨和氣百倍某官英標玉立雅望川流稽其存心要不出東平之善至于餘事猶不減子建之才越從踐揚休有課最使者之星一出不待載驅而已孚刺史之天洊開豈應選表之猶未瞻言劇郡孰與是邦分共理之憂誰實任虎符之寄疇已試之迹要莫如麟趾之英肆令白粲連檣之區頓有紫氣浮關之望第恐促馳于召節庸或不俟于建牙某投老歸歟受㕓惟甚焉敢切置盂水以效任棠之髙第當自駕牛車勿負兒寬之殿惟一州徒得君重而千騎方以暑臨其于節宣之宜倍有劼毖之禱代通問崇慶李校書立朝無補猥分出守之符接壤相交乃獲善鄰之寶矧惟事契積有嵗時聆伯氏之吹塤早知有覿居是邦而友士無以易堯其于修辭庸可愒日某官髙文作古奧學造微由蘇氏以來未有如公家父子兄弟之懿雖孔子復出亦當在門弟文學德行之科頃方從册府之遊亟以忤柄臣而去道不容而何病名以退而益髙使簜州麾所到咸書于善最從班政地胡今尚鬱于逺猷諒無暖席之淹即奉受釐之問式究賢業永弼治朝某祗若恩言撫摩凋瘵民亦勞止孰寬魴魚赬尾之憂我儀圖之惟有鄰女分光之望心焉欲述口莫能宣代回詹歸州庭集孔鸞嘗並遊于朝路符分銅虎旋各把于州麾追惟傾蓋之定交以至舉觴而相屬恍如昨日不知嵗月之屢遷惠我好音方愧禮文之不敏恭惟某官文追古作學得真傳立館下招諸生方發青襟之藥坐堂上稱太守俄班皂蓋之春坐令三峽之濵大喧五袴之詠先一州而後天下此豈宰物之心鼓元氣而靁域中即聆選表之命某倦遊甚矣決䇿歸歟已辦扁舟將過黃堂而欵語所憂召馹即隨丹詔以趣還感榮問之先施布謝悰而莫究代回嘉定李校書􅌫行春而駕一馬內懷鶉特之慙遣騎而致雙魚中有珠璣之貺細哦此作足振吾衰某官世濟方聞之材心傳正大之學餐楚客之秋菊恐它饋之或傷織天孫之錦裳非今人所能到尚屈雲霄之步來分銅虎之符燕寢凝香暫擁黃紬而護卧璇題納月即攀紫禁以上征某猥以謭材來臨劇郡地如錯繡所欣鳴柝之聞邾勢若同舟當有餘波之及晉欲報之惠莫究于言回眉州安直閣癸仲五馬二毛悵已乖于壯志雙魚尺素駭忽拜于好音凜然駿氣之橫空寫以名章之滿紙髙懷甚茂永好難忘某官家傳貫日月之忠身被奄龜蒙之錫赤舄几几蚤從周公之拜前方城臨臨剩喜西平之有子暫攝守符而共理即承帝命以為真某洗印云初課功何有受察遙瞻于大幕我所焉依同寅近託于鄰封公無遽去通判代回潘倅昌齡伏審已戒行李聿來赴瓜郡承洊飢豈復執樂紅粧之夢公為别乘適應浮關紫氣之占民曰樂哉吾事濟矣某官才無施而不可政所去而見思入綴鵷鸞汔可慰輿人之誦洊分風月竟莫曉宰物之心亶惟此邦尸以拙守必有王祥者出來詠海沂之功庶令宗資之流第畫汝南之諾姑屈逺步來分顧憂某未遑名姓之通遽拜緘縢之辱州雖無蟹乃有同寅協恭之賢書已得魚况妙崇雅黜浮之體難忘永好莫報珍投感愧滋多占言未究幹官代回許提幹可同桑梓之隂焉敢以鄉丈人而自處帶櫑具之劔何以異部使者之見臨辱先以書喜甚欲舞某官文追古作材應時須鸞鳳卑棲初不歎枳棘之陋鳬鶩列進亦何妨松竹之吟兹以步搖之冠來贊圜法之府公亦屈矣乃久涉州縣之塵我獨跫然獲再見州里之彥某朅來漫仕雅已倦遊知子之來固不啻似人之喜道舊為樂意必有起豫之言紓意良勤占辭莫盡代回彭提幹扶拜州千里顧不材何以當之置水一盂非故人尚誰望者朅來訪問乃爾乖離望梅嶺以興懷撫鱗緘而增歎某官早從里選遂以文鳴九萬里之摶風了無餘子十九年之遊刃綽有能聲豈青衫旅荷葉之枯而黃本緩石渠之校帶櫑具劔豈久為暴使者之賔衣紫夾囊行且列漢甘泉之侍某拜州邇止念舊悵然披郇公之朵雲自慙不敏聞道州之鳴鳳日兾來歸代回本司幹官比因錫對驟俾乘軺自歎素無能聲何以膺衣繡持斧之任所幸部多君子庶共肩同寅協恭之心至于髙明又其尤頴藹然妙墨如見櫑具之劔步搖之冠久矣吾衰莫報明月之珠夜光之璧欣頌滋切科條莫周回宇文制幹萬里遐征方有陽關無故人之歎五雲下逮喜陪宣州多君子之遊惟草木之味本同而膠漆之情惟舊獲同王事豈曰人謀某官世濟詩文之宗家傳忠孝之譜鐘鏞在東序殆非近世之人鸞鵠峙碧梧休有先正之樣豈期賔幕得此勝流儻肯屈逺步而不留能令公喜當剡辟書而上徹何以假為惟憂别奉于除書行且徑登于要路某一違矩範屢閲嵗時不謂凋年復有握手道舊之適矧惟幸會共展同寅協恭之忠曽修問之未遑辱飛箋之先及其為悚怍未易名言赴召代賀交代制置吳侍郎赴召獵伏審光膺詔紱寵錫召環託坤維半壁之天久矣宣勞于外服申巽命三夷之日趣令歸覲于中宸故民雖切于去思寰海實期于均福某官德尊一代望蓋群公問學得其真傳殆南軒晦庵之未沒文章特其餘事亦廬陵南豐之復生厯觀所到之踐揚皆本平時之講習酬酢萬變誠敬一心頃西陲俶擾之餘正南面顧憂之際凜凜栗栗若覆墜潛消反側之情娟娟哇哇期棄捐復返團欒之樂其效有如此者非公誰實任之既焯著于顯庸宜晉膺于巨用爰俾介圭而入覲佇聞上席之屢前衮衣歸我公兮咸喜正人之得路中國相司馬矣抑令強敵之革心揚于大庭是在不日某振辱朝廷之臨遣俾相先後以踐更巍然纓冠而來雖為國人而贊喜瞪若絶塵之後獨詹雋軌以懷慚炯炯乃衷呫呫莫究內祠代賀李侍郎除在京宫觀兼侍講燾伏審光奉綸言歸侍經幄久矣去國其何以慰蒼生之心幡然賜環稍足以生善類之氣蓋公論乃今而後定殆揆路繼此而延登側聞除書幾至曲踊恭惟某官統傳洙泗秀出岷峨聖人不生豈在乎弟子之列大雅既熄當求之古人之中盡翻金匱之藏有光玉振之響氣直養而無害材何施而不宜頃由簡知入躋禁近有能典朕三禮是資寅直之誠爾尚弼豫一人綽有論思之益曲髙難和道大莫容納履星辰之間把麾江湖之外顯曹僻郡未嘗干喜愠之懷緗帙縹囊初不廢校讎之課淵乎于道而益進淡然與世以相忘其如治狀之上聞不容造物之我舍錫以芝檢歸諸筍班奉琳宫之緣宛在上清虛皇之側勸邇英之講迪以合宫衢室之初行將登庸大慰僉屬某為品甚下辱知獨深墮在塵埃采鹽之中限以雲泥關山之隔伏讀贊命喜倍等倫郵置相望喜連意紓辭之易逹戍瓜伊邇將考德論業之有期頌詠滋深科條莫究宫觀李參政復官奉祠璧伏審盡還峻秩晉奉真祠夙夜匪躬久矣真心之莫白風雷作號居然公論之復明側聆播告之修一洗讒誣之巧某官心傳正學世篤孤忠國且將危安得潔身而苟去敵非易與固當出力以廷爭使人皆王陵則諸吕孰與誅朝有柬之則二張非所患君子所為衆人不識孰能明束緼乞火之謀宗廟再安二聖重歡乃實繫曲突徙薪之䇿顧令罪去其謂人何宜皇明之燭幽下璽書而錫命故物復崇階之舊清班從間館之遊周公居東三年行對命禾之寵竒女墜地七日豈淹講室之居即揚䇿書歸相興運某登門舊矣讀詔欣然非為遊從之私將有拔茅之望良喜是非之定少寬恤緯之憂進秩賀安大使男除將作監丞伏審東閣新除監丞光奉宸恩擢丞戎監綵衣贊晝夙肩帶礪之盟紫渙疏榮入簉鵷鴻之列蓋屯運值將終之會方朝家為必勝之謀凡而修車馬備器械之防畀諸扶日月整乾坤之胄恭惟某官道開百聖忠貫三辰方介鱗易我衣裳孰殲逆黨幸芝蘭生豫庭砌同決大謀迄茂建于國功遂挽回于人極雖榮躋于京秩殊未滿于輿評逮乘半刺之車蔚為千里之福既已無施而不可豈應待次而後升此嶽牧所以極口而薦揚談士所以扼腕而歎息公論纍年而後白除書一旦而乃來西平有子我有臣姑升華于武監周公拜前魯拜後行俱幹于政機某託在所臨欣聞是舉焉依庥映久哦少陵廣厦之篇願假須臾更賦鄭武緇衣之什抃蹈云極宣陳莫殫致仕賀少傅周益公致仕伏審勇退莫回疏榮益寵推挍近世謂當班文富之間瞻言髙風乃忽在羲皇之上雖君相歎息而惜其去然猿鶴歡舞而候其歸擕持全名照耀千古某官勳在彞鼎名滿華夷方堂堂當國之秋極蹇蹇匪躬之操格天扶日了無一節之詭隨破斧缺斨始有後來之洶湧人方願去子髙之胄公乃遂挂神武之冠從容緑野之遊繾綣赤松之約方將騎牛澗壑盡領故山之雲煙爭席漁樵不襲曩時之爵里世如果有仙者公獨非其人歟某立弟子行且三十載昔者在青雲之表自憐無附驥之階今兹遇紫氣之祥第欲上著書之請交代代誠齋回交代傅郎中伯夀就移星軺式按水漕教條已熟固不待傳車之周爰風采一新而後知舊政之瘝在幸甚烹魚之喜跫然羅雀之門下拜以還不敏是懼某官修名蓋代駿氣橫空嗣奕葉之風流殆草堂相君之未死收兩科于談笑何青錢學士之足云厭紬畫一之書自詭撫字之政使得數十公參錯豈其隆平之或難不應九萬里扶搖至于今日而猶未自輟粉闈之直駕言繡斧之車蓋江湖阻深當注意于萑蒲之間而雲濤變化皆獻狀于几案之上進足以課空囹之最退足以助覓句之豪亦既久之兼是二者謂綸綍且下盍歸置清切之班而杼軸已空又當妙將輸之選遍疇于衆就畀若人參酌取豫之宜惠綏凋瘵之俗恐未暖席即將賜環某雅矣倦遊幸而得去昔抵李生拜侍御已凄其動老矣之懷今慙栁下愧孫登乃浩然起歸歟之興上還印綬歸侣漁樵嗒焉巖居敻與世隔忽聞踵磨牛之前武今已得流馬之良材藏疾匿瑕其知免矣連辭紓意更辱先之欣愧兼懷科條莫究代通交代吳制置獵騎馬聽雞尚憶常參于後乘捫參厯井豈期來合于左符惟平生臭味之相同故如許夤緣之有相蒙成吾知免矣奏記庸可後乎某官人與古稽學先物格大鏞在東序蔚為寶鎮之儲衆星拱北辰宜在泰符之次設施特餘事爾榮貴皆固有之屬時方病于搶攘隨事各為之整頓往屬西陲之事變上關北闕之顧憂肆疇不世之英庸弭未形之患甫開制幕大得民和一以為赤子一以為龍蛇既已了無于反側用汝作霖雨用汝作舟楫固當遂正于登庸詔函果趣于追鋒宸扆久為之側席某自憐垂老雅已倦遊方欲抗章上間館珍臺之請不圖賜履在天梯石棧之間深憂䇿蹇之蹤難望絶塵之軌舉觴道舊諒不寒焚襖之盟更僕告新願盡述伐柯之則其為歸倚莫究名言謝免解免解謝參政童而覓舉白紛未入于能書晚乃出山玄草遂塵于薦紙薄言假寵俾勿徒還其在衰遲亦為榮耀竊維科目拘攣之弊多失山林魁磊之英昌黎韓愈之將歸自傷莫齒于下士廣文曽生之既擯人皆致弔于有司儻能收拾其所遺亦足扶持于斯道某羇窮一介坎壈百罹挾册讀書早參諸老杖屨之末焚膏繼晷僅得古人糟粕之餘亦嘗為俳者之辭以出應州家之試瑟雖工而王不好將以何求斤欲揮而質已亡不如其已嗟吾生之至此彼勍者其為誰永惟師友之淵源豈為科名之得失吾玉未嘗獻足未嘗刖猶可自珍彼力苦易制價苦易酬庸何足羡已矣風雲之夢歸歟松竹之逰搔首著書頗為千載之計閉門覓句足了一生之愁夜闌山鬼之吹燈日旰鄰僧之送米啓夕秀于未振大放厥辭發孤笑于羣憂遂忘其老偶輟犂鉏于谷口來瞻觀闕于行都吕醫之布衣芒鞋尚須薰沐馮諼之蒯緱劔鋏誰念歸來鳥已倦而欲還人不知而奚愠不圖金匱石室之彥務廣竹頭木屑之儲下急急之符而取將採平平之䇿而薦進寶藏康瓠適用伊何刻畫無鹽過情已甚迄疏榮于北闕許偕計于南宫雖技斷斷兮無他得此已幸然髮種種其如此豈有能為第惟微么重以朴野翻十二經以説焉能動于老聃載三千牘而來不加多于方朔乃以巴人下里之曲猥玷蓬萊道山之藏儻因是而獲傳亦此生之至願亶時幸會厥有由緣某官文掞國華學傳聖韞人循循其善誘溫其玉振之音心休休其有容籍甚海涵之量晉席登庸之拜益殫甄冶之私謂鸒鳩飛搶榆枋雖無它望而蠧魚生死文字是亦可憐儻令一善之弗庸時謂匹夫之弗獲乃曲收于芝箭以上徹于冕旒俾少酬鉛槧之勞以歸見鄉曲之士某敢不激昂宿志紬繹舊聞窮當益堅肯但攻發䇿決科之學死且不朽更勉圖傳世行後之方不為小人之歸是乃國士之報過此以往莫知所裁謝薦舉謝安大資舉充嵗薦卑飛控地焉敢為附尾之謀暖律回春乃特剡需頭之奏驚寵光之驟至忽涕淚之交零切惟近世薦引之常無復古人特逹之舉必也工于馳騖日掃舍人之門否則宿有夤緣久備老聃之役乃以喣濡之寵申其繾綣之私未有見其文而信其心如歐公之于蘇明允觀其主而知其客如昌黎之于楊湖南豈其公道之復行乃以此身而親見伏念某少而孤苦長亦賤貧製芰荷以為裳難追世好焚膏油而繼晷見謂書癡屢嘗從試于有司四顧孰為于勍者嘻其不遇曾二鳥之不如已矣歸休雖萬牛而莫挽旋結隂崖之屋親種陽坡之瓜樂琴書以消憂自適園林之趣懷稻梁以飴老不萌簮紱之心莫知無似之姓名何自有聞于朝野急符傳命辱徴繁露之書特詔疏恩遂賦支離之粟甫拜周旋之惠便作終焉之謀曾無滿嵗之淹復被從軍之旨幸甚折腰之地託于賜履之區步亦步趨亦趨雖未遂摳衣之願筆則筆削則削乃先騰踰衮之褒朵雲兼拜于函封駑馬頓增于倍駕以下缺景翳翳以將入其如已迫于崦嵫技斷斷其無他何意爭先于岐路方畀祝釐之秩忽騰辟掾之章出處何常惟義之歸勉徇河陽之請飢凍雖切逺邇交病早興彭澤之懷忽驚鈞播之私曲借言揚之寵自聞此舉實震于中蓋試吏之日淺而積閥未深奉身之術踈而與物多忤寵光所逮媢嫉將興惟昕朝重違于鼎言故隆旨亦許以寸進瓶罌之量得此已盈榆枋之飛它復何望兹蓋伏遇某官保釐西土師表百僚進見之士豈復賢于周公猶躬吐握之禮生民以來未有盛于孔子亦推循誘之誠故雖庸虛所不遐棄式廣兼收之路曲施不報之恩重念某漫浪一官流離萬里嵗華晼晚悵來日之幾何子舍淪亡况此心之欲折儻歸裝之甫辦即投劾以言還和擊壤之歌不復有求于當世刋齊天之頌或能仰述于閎休使其有後世之傳亦足為知己之報過此以往莫知所裁謝使長黃侍郎職狀竹坡千室鳴絃雅契夙諧于附翼一行作吏剡章又辱于需頭矧惟解褐之由以至從軍之日稽其恩造不出他門載觀奬豫之過情不知涕泗之橫臆某年開七帙恩與一官移甘菊于簷前于時已晚嗅決明于階下其立良難所為扶老擕幼而來亦惟飲水求芻之故旋類倦飛之翼欲回興盡之舟蓋緣蒲栁之早衰重以桑榆之欲暮有時而寄有時而取何足裝懷無失其故無失其親尚祈假寵驟拜薦揚之及恍驚神觀之還况惟文名政績之褒出于儒宗吏師之口不特增光于老朽又將夸視于友朋受言藏之不虛來矣恭惟某官羽儀一世槖籥諸生循循然善誘人俾皆有得斷斷兮無它技亦與兼容興憐末吏之窮途猶是曩年之下客慨然感歎賜以品題某惟當服膺輕外物之言決䇿老故丘之舉主父之日已暮未忍倒行陶令之園將蕪逝將歸去不為苟進以答主知謝漕使趙監丞舉職狀凋年試吏方深濡翼之慚薦紙噓枯忽拜需頭之辱假以使華之寵俾為末路之光載披刻畫之章莫喻凌兢之悃伏念某資惟甚下材不逮中讀墳典八索之書誰實為于勍者決得失一夫之目人皆弔于有司消磨已盡于壯懷潛伏分甘于幽屏不謂金閨之彥偶聞谷口之名録其鉛槧之勞畀以斗升之祿方祝釐而賦粟俄奉檄以從軍惟時試吏之邦適𨽻建臺之地儻匠石之囿伯樂之廄等不材下乘而弗收則天池之濵大江之濆與凡介常鱗而何異屬者常試以請惠然賜報曰俞矧舊學已荒顧深醇之焉在而虛詞無當于雄健以謂何至于議論踐履之間未免簡書朋友之責凡此衮褒之所逮俱非樗散之能當兹蓋伏遇某官氷鑑人材模範士類人循循其善誘思屢竭于兩端心休休其有容曽不遺于一介方登車攬轡之未久已足國裕民之兩全行將歸金馬之班豈久屈木牛之運紫樞黃閣遂將宅揆以經邦赤箭青芝預欲儲材而待用顧雖至陋亦在兼容某敢不振厲弱材護持晚節肯干官謗以傷門下知人之明謹守師傳益究古人為已之學倘或有聞于後世是為仰答于已知越是以還罔知所措謝總領張殿撰薦舉出山已錯况肯為寸進之謀藉手言還亦欲假言揚之寵不敢請爾幸而得之惟其無箋記之千求或可矯世俗之末失伏念某稟資甚下涉世全踈少不如人恐墮踽踽涼涼之號動而得謗乃緣竒竒怪怪之文雖詞類于俳可無學而能然博懸于投初不在乎得返漁樵之初服主鷗鷺之齊盟慨然自斷于此生已矣無求于當世駭忽傳于膚使猥見謂于逸民閭里浮沉焉有箕山之雅操閨臺刻畫蓋緣谷口之虛名捐微官以乞之俾遐征而至此枉河陽之馬幣顧有何勞問杜曲之桑麻逝將引去敢期薦剡俯逮陳人兹蓋伏遇某官長材百吏之師粹德萬夫之望星槎玉節觀風已遍于兩川流馬木牛總餉進兼于四路若時以身受察之士孰無願忠望賜之心雖激濁揚清氷雪頓生于筆下然尊賢容衆渭涇自判于胸中亶是羇孤蒙此振拔某敢不益堅素履勿負初心行且歸歟必不待塗窮而下泣顧雖老矣豈其緣日暮而倒行切矢此身以報知己謝李憲特薦裔夷干紀曾微敵愾之勞膚使䇿勳猥玷薦剡之數得非所望愧甚于榮切尋小醜跳梁之因正坐平時姑息之故慿恃其險阻肆為晝伏夜動之謀虔劉我邉陲不勝天寒雨濕之慘倘師干之不出豈狼心之可懲爰妙選于使華俾恭行于天罰算無遺䇿役不淹時殲厥渠魁遂挫方張之冦執此群醜仍推不殺之仁弛張皆合其宜招懷卒復其舊功乎偉甚足寬廊廟之顧憂僕也苶然莫致戎行之死命敢期剡牘併録陳人三豪輒濫于一名片言良重于九鼎兹蓋伏遇某官網羅千載師表一時然太乙之青藜厥惟舊德授編書于黃石綽有壯猷乃今成此顯庸在公蓋其餘事奉使有指即觀斧繡之言還事君以人尚恐桷榱之或棄諸言見及小已知榮某雅有倦遊之懷恐虛借助之意亦可稱于天下曰知己以夸踰衮之褒仍當明于大君紀䇿書更作齊天之頌過此以往莫知所裁謝潼川范帥應詔舉所知九天綸綍肆今博訪于英材一介草菅不謂亦登于薦紙無乃傳聞之誤可勝悚怍之私切觀聖上欲兼收毫髮絲粟之材是以明詔乃併及閨臺閫節之彥嚴為程期以示急先之意不拘統屬以廣論薦之途側聆大哉之言具識厚甚之意明天子用心如此其孰忍欺賢大夫所學謂何焉敢輕舉如某者一無他技百不如人矹矹讀書所得惟糟粕爾悠悠閲世到處如枘鑿然投名鷗鷺之羣拔足塵埃之外與漁樵而爭席求農圃以為師敻與世以相忘分此生之永已不知亡似之蹤迹何自有聞于簮紳外之部使者察亷力誦河東之賦內之卿大夫獻納僉諧谷口之名朝而幸與于一官暮即遐征于萬里昌黎幕中之辨方有害其生之憂鬷蔑堂下之言孰能㩦其手而上兹蓋伏遇某官家傳髙節世濟令名要路方開不為瘠環而少屈扁舟徑去殆是忠文之復生乃于傾蓋之初亟定斷金之契雖大杗細桷材其要為不同然小草長松風味頗亦相似乃曲收于蕞品庸上徹于嚴宸兹乃古人之所為暴之天下而無愧某敢不力持晚節率履舊聞雖及凋年所遇當期于益壯至于逺道何心更忍于倒行使其小異于鄉人斯足仰報于知已謝工都大應詔舉所知皇皇者華方掄材而賜詔微微小子乃假寵以充員恍莫悟其從來凜不知其所措伏念某嗜書成癖坐詩得窮少也斐然意頗輕于餘子今其老矣竟何異于庸人白頭偶得于一官黃帽遐征于萬里折腰斂版已失平生韋布之髙尋壑經丘第作故山松菊之念吾生行且休矣曷月豫還歸哉敢圖膚使之誤知特剡需章而論薦雖撫心自歎若為可稱于品題然藉手而歸亦可有辭于朋友兹蓋伏遇某官德浮于位學世其家入簉鵷行星宿旁分其明潤出將虎節山嶽亦為之動搖旋觀揚清激濁之間了無吐剛茹柔之態推此心而薦士肯萌意于欺君惟其氣味之稍同重以肝膽之相照肆垂噓拂以慰羇窮某敢不力振其衰以稱此舉得知己如此夫豈可忘雖古人復生亦無甚愧佩服不下宣陳莫殫謝樊憲應詔舉所知伏以繡衣薦士其誰宜在于選中樗散充員自顧敻踰于望表譽之殊過其實談者或疑其私側聞剡章莫喻慙色伏念某耽書成癖閲世多竒襞襀陳言反不逮原夫之輩慷慨長嘯孰能知梁父之吟偶然漫浪于一官乃爾漂零于萬里幕辨或以為叛其若衆媢何事了自笑其癡幸有公論在辛勤兩載坎壈百罹敢期僅有之寸長乃忽咸登于薦紙兹蓋伏遇某官主盟善類篤敘襟期面目孰何已定古者金蘭之契勢位略去殆過故交車笠之盟式是言揚之加夫豈私謁之俟某猶當益堅素守以答已知白頭已負平生雖不能致吾君堯舜之上黃金不如一諾或可使得此聲梁楚之間過是以旃莫知攸措謝制置劉閣學舉十科後溪聞師友之談公未嘗不在巨鹿之下分科目而舉士今乃獲入薦鶚之中藐是凋年饗此遐福伏念某讀書有限涉世全踈取友兩周每勤伐木之夢從師千里恐孤斷臂之傳顧雖有意于為文祗以自鳴其不幸老苒苒其將至曽未有于微功芳菲菲其彌章亦何禆于世用莫知庸陋之蕞品何自徹聞于諸公捐微官以乞之俾遐征而至此筋力盡于跋涉精神汨于應酬少不如人况已寖忘其故步老而無述恐猶未免于鄉人不圖一世之宗師忽假片言之華衮雖撫心自歎若為可稱于品題然藉手而歸亦可有辭于朋友兹蓋伏遇某官德尊一代望冠諸儒心休休其有容不遺一介人循循其善誘思竭兩端肆憐賤迹之萍蓬曽侍故人之杖履思元賔而不見遂收所與之徒見子張而問交頗訝拒人之異肆加噓拂以慰羇窮某敢不激昂懦衷紬繹舊學雖仲尼春秋之作遊夏不能措詞然昌黎指教之傳籍湜焉敢叛去謝劉閣學侍郎甲舉顧問科從諸老之遊蹤迹獨違于墻仭考十科之目姓名乃入于薦書豈非聲氣之同不待色辭之接人皆謂此舉殆不愧于古人我獨省其私懼莫酬于知已伏念某生而不韻老矣無聞青燈細雨之讀書不求甚解明月清風之覓句秪以自娛了知與世以相違惟恐入林之不密偶賦支離之病粟故緣谷口之虛名厥初半通之銅意謂周之而可受逮此九折之坂始知仕者之良難未澡滌于征塵復淟汨于吏鞅問學荒落愈不及于前時心志凋零但欲歸于舊隱不圖薦剡下迫陳人矧引為待問之流祗益重抱虛之愧兹蓋伏遇某官望隆從槖學擅儒宗備嘗出藩入從之榮獨髙難進易退之節故家相印人言忠肅之復生寓里文盟士喜東坡之未逺顧盻攸暨枯朽復芽其于片言之褒顧豈它人之比深惟儇淺殆如小巫之見大巫無乃博聞不知今我之非故我某惟當力持晚節勿負初心正路是由肯為塗窮而下泣終身自勵敢緣日暮而倒行謝費大參士寅舉著述科白首飄零誰念抗塵之役洪鈞坱圠忽覃踰衮之榮恍莫悟其從來凜不知其所措竊以昔在元祐乃國朝極盛之時相維溫公立薦舉不刋之法其間鉛槧之士最榮著述之科必其髙文大册可傳之無窮然後當在此位如其狂歌雜謡自鳴其不幸安能若是其班某學則空空文惟怪怪焚膏油而繼晷見謂書癡製芰荷以為裳莫投世好分已無求于當世退而自放于窮山不謂諸公之誤知特以一官而收録雲無心而出岫偶為捧檄之行水有時而回川久動歸田之夢所幸小已宦遊之地實惟大臣均佚之邦遷先生之琴瑟在前休有依歸之便見長者而舍館未定空懷不敏之慙敢圖特達之知辱在薦論之數蓋曩司造化偶遺失所之一夫故今借揄揚尚令增價于三倍惟是雅健通明之過豫俱非迂踈狂斐之能當噓枯吹生雖重拜假寵之意循名責實無乃傷知人之明某官心休休其有容人循循其善誘生民以來未有盛于夫子鄙夫猶竭于兩端進見之士豈復賢于周公沐髮尚勤于三握矧聖上方從于人望而我公行見于衮歸固當預蓄于桷榱以俟助成于厦屋肆如庸陋亦賜甄收某敢不振作懦衷護持晚節雖不能兼唐四善上課最于凋年亦猶當作宋一經書弼諧之懿鑠過此以往莫知所裁謝奏辟謝安大使辟充制置大使司屬官剡章天上夙蒙褒衮之華辟掾幕中重拜禮羅之辱雖在平生之親故亦無如許之恩憐顧雖倦翼之莫回其若感悰之滋甚伏念某讀書有限涉世全踈少也斐然意頗輕于餘子今其老矣竟何異于庸人不圖廊廟之巨公猥録文詞之小技支離之薪十束蓋以病而周之石生之飯一盂復何求而來者顧以間世萬人之傑再造西州半壁之天青泥盤盤雖道塗之云逺赤舄几几幸台衮之非遙得依泰階之末光是亦平生之至願方息肩之未久且望履之無階姓名已沐于薦揚朋舊皆為之駭歎頑金無用竟虛甄冶之功洪造曲成尚有噓濡之意特剡公車之奏俾參屬吏之遊陪碧油談笑之餘立青佩講論之列兩俱幸甚重拜矍然雖近神山而舟輒還邅回莫進然望梅嶺而渴已止欣幸冞深冒殊寵以若驚豈素望之敢到兹蓋伏遇某官道關百聖忠貫三精折尺箠以笞羌夷視為餘事挽天河而洗兵甲正徯壯猷方將收拾毫髮絲粟之材于以主張欂櫨扂楔之用肆如甚陋亦在兼收某敢不銘在肺肝詛諸祖禰雖俗緣未斷不勝莊舄之土思然永好難忘敢替昌黎之山仰過是以往靡知所裁雜謝代曽宰改正過名謝周參政省齋吹毛洗垢自憐墮在于丹書補劓息黥所恃尚存于清議矧方當衆賢和朝之旦亦豈有一夫向隅之寃懷哉厦屋之帡幪有此片言之感激竊以古者蔽罪輕重不過于以情後世慿私喜怒鮮聞于以類子淵何罪門人致疑于拾煤麟之雖賢或者以為竊屨張儀豈楚璧之盜翁歸寧婦翁之撾謗之朋興雖百喙詎容于自列久而論㝎于衆人焉可以終欺蓋人不能以皆賢故過必觀于其黨方惡直醜正固不能自逭于官針然悼屈哀窮要必有主張于公道伏念某時之乖而寡與命以薄而數竒少也執經頗惟書之是信長而筮仕政坐此以成迂頃緣薦書出宰岩邑大本之薤難拔旁觀皆切危之新植之楊易搖生意至是盡矣眷言鬼蜮之毒率皆城社之餘彈以柱後之文無微不察溢為子虛之數謂天可欺知其切切于吏姦而反被之以縱吏之名知其孜孜于民瘼而反加之以刻民之罪雖浮雲去來之何有况不繫于癢疴而平生名節之謂何兹未甘于破壞簡書具在本末可稽儻謗議未明將何以見魯衛之士如毫髮有愧亦安敢效兒女之爭論鞫既孚虛實自見卒從昭雪一洗垢汙請言其由端有攸自兹蓋伏遇某官世所師表朝之羽儀人望攸歸久鬱具瞻之願上心簡在果膺夾輔之除參贊鈞衡時亮天縡爰念抗塵之職莫甚為邑之難如得其情猶當為之勿喜欲加之罪其獨患于無辭矧在陶鈞坱圠之中而軫簮履棄遺之念詎令巧詆而不平反某敢不勉䇿其愚益堅所守雖嵇叔夜之廣陵散庸有不堪而段會宗之鴈門踦庶幾可復過此以往莫知所裁代曽主簿謝謝御史作先人墓銘死生契濶殊不寒敗襖之盟春秋謹嚴是以有華衮之託整襟下拜流涕無從追惟先君夙藴壯志引杯燒燭慨然有意于事功看鏡倚樓其如不偶于時命江湖流落嵗月侵尋腹憤胸竒竟不得以效其有龜趺螭首其可無以掩諸幽藐是諸孤了無竒節不有賢者為立言立德之宗誰其矜之俾大書特書之寵徼福平生之好挂名筆削之端施及後人享此遐福兹蓋伏遇某官彌文作古雅望鎮浮冠豸而辨貞邪不為權要而少屈獲麟而示褒貶肯以故舊而或私槩以至公時謂不朽生者不愧殆庶幾希有道之碑死而有知尚足慰橋公之墓某敢不激昂其懦銘篆于中儻未蓋棺或可踐揚名之訓雖及沒齒猶當懷結草之心代前人謝楊檢討書先人墓碑立玉筍于天上殆不知塵世之卑落寶墨于人間乃施及泉扃之閟龍蛇岌其飛動草木為之光華藐是遺孤澘然流涕慨念先子夙有壯懷州縣之職徒勞莫白所挾丘山之木已拱孰掩諸幽恐泯無傳是重不幸若稽唐世有若誠懸凡碑碣無若人之書則子孫被不肖之責蓋人品髙甚蔚為多士之宗宜毫端及之頓增九鼎之重矧惟疇昔辱在從遊得妙墨以耀方來不必述先友之記借此寵以塞永慕殆不負蓼莪之章受言藏之其知免矣兹蓋伏遇某官世所師表人之羽儀人與古稽不在孟韓之下筆由心正豈止顔楊之間方文星環北極之躔而砥柱屹中流之操雖遊戲書者皆將藏弆以為榮矧褒貶繫焉固應附託以不朽以此大事控于仁人諒追惟于生平恍已隔于存殁俯仰已成陳迹人誰無感慨之懷死生乃見交情吾何愛揮毫之頃寫以金管爛然銀鈎燾其後人燕此遐福餘同前回楊直閣惠文長孺誦誠齋之文章前無作者傳當家之衣鉢必在若人偉哉青玉案之工賦諸紫芝曲之側殆類子虛烏有之賦姑借以發其絶俗之詞不然子輿桑扈之交何至有如許逾涯之語君其過矣吾甚愧之某官學世其家文近于古雲漢生于筆下凄其飲墜露餐落英之清丘壑具于胸中超然羞崑崙薄員壺之想篇章一出等輩皆喑職以是娛其翁夫誰能出其右某猥蒙儷語加賁陳人早知五七之工殆是陳正字之派不謂四六之妙亦有王特進之風永好難忘占辭莫盡回誠齋餽嵗萬里適當凋年聿修餽嵗輒分常平使者之春酒夀以乘壺併遺良二千石之盤飱致諸百輩願介履端之慶亟膺舉首之榮某屬方啼飢遑暇作節固嘗過屠門而大嚼或乃逢麯車而流涎不圖牢丸之儕流忽惠然而見顧重以歡伯之苖裔亦與之而俱來逮下拜金聲玉振之清音又知為龍節虎符之上客延之以見祖禰職是而樂妻孥仰惟恩私施及存殁昔過子雲而問字者類皆載酒與從夫子而及門者殆至拾煤未有子襟之朋而重師門之費時時客舍食有馮歡之魚往往盤餐歸置翳桑之槖逆施如此重拜謂何冥報相貽第有淵明丐者之口頰眉夀無害更效僖公閟宫之頌歌賀冬代誠齋賀周退傳望觀臺之雲初第仰冥鴻之逺占南極之景因遂見景星之輝維時備福之來不在耆英之外某官具元化于胸次粲明水于筆端方扶日以上天衢群隂已為之畢伏今御風而遊物表四時猶可以前知豈應挂神武之衣冠惟以幸平園之梅栁公如不起端恐虛道長之祥民亦有言胡以慰衮歸之望裒時之頌俾夀且昌某自放千岩萬壑之間無復五紋六琯之句避人掃軌初非有意于閉關塞向御冬所恨無從而賀厦空有善禱溢于乃衷代前人賀周監丞五紋弱線實維化日舒長之占萬壑層氷忽憶故人髙寒之樣折乃將舒之栁閲焉不改之柯某官道大天通官成時正四十圍溜雨飽諳嵗月之風霜八千嵗為春寧計人間之日月履此一陽消息之運歸哉五更供奉之班某不惟形容獨老之羞抑亦節物暗換之歎梅邉山意頗思從同社而醉吟雪後杖藜恨不偕賀客之旅進代賀安大使弱線五紋方驗漢宫之日洪鈞一氣併融魯觀之雲惟時備福之來不在元臣之外肆裒善頌往候涓人恭惟某官道大格天權髙分陜百揆四嶽有州牧方兼內外以疇庸五更三點出鵷行盍領星辰而顓面君子已占于道長我公行見于衮歸俾夀俾康時萬時億某顧詹大幕如在層霄銅駝非故鄉空有感時之歎珠履皆上客阻陪賀厦之賔頌詠惟勤敷陳莫究樂語代宴費大參樂語洪鈞播物曽扶日轂以上征紫氣浮關乃屈台符而下照肆飭初筵之秩載延几舄之留恭惟某官命世真儒調元宿望間于兩社夙參幹于繁機操此萬方盍登崇于顓面亟上均勞之請莫回勇退之謀天近紫宸冠仙班于邃殿雲迷緑野窮勝事于明時撫舊物以興懷為故人而命駕驂鸞翳鳳不嫌塵世之喧卑食蛤踞龜更約後期于汗漫江山炳耀父老歡呼某曩在朝行時親德宇聞一言于堂下頗辱深知記半面于門間未忘雅好惟是剖符之地實聨拂日之門忽蒙振騎以來臨乃獲舉觴而相屬適綵勝迎春之日正油幢啓宴之時度暖響于笙簧散祥光于俎豆翠眉橫黛歌聲上遏于行雲微步凌波舞袖低回于急雪瓊艘泛緑寶炬搖紅叵量賔主之歡共醉神仙之侣引杯善頌新年當勝故年抵掌劇談今夕不知何夕可無韻語以寫抃悰相君曩嵗轉洪鈞手散陽和處處勻衮服肯迂今日駕錦城便勝去年春珍臺多暇何妨醉左席猶虛正要人飲罷天邉有消息催歸一騎走紅塵代吉席宴都運煥章校書知府親家致語衣繡持斧方乘犯斗之槎買紅纒缸暫駐拂天之斾式是兩家之好肇開八世之祥載臨奠鴈之期肆卜合簪之宴恭惟某官髙文作古逸氣橫空羞崑崙薄員壺舊髙徑節奪蓬婆收滴博新立雋功邉城復遂于耕桑蠻嶠頓沉于烽火雖出笑談之餘事足寬旒扆之顧憂舍爵䇿勳進崇資于寶庋過家上冡渙新渥于星軺抑令寄徑以來歸看即告庭而爰立適六轡載塗之便屆三星在户之辰天風吹環佩之聲肅將嘉禮霜日照旌旄之影增賁賔筵厥惟天意之有開此豈人謀之能及判府朝散德著東西州望隆南北阮謝氏之雪似絮夙參吟咏之功蹶里之娣如雲共證繾綣之好亦屈班春之蓋來臨合卺之期判府安撫龍制侍郎宿肩事契肇締姻盟追曩好于斷金聫新榮于倚玉緑樽翠杓共醉九霞之觴急管繁絃爭鳴雙鳳之曲山蹙百眉之緑花搖千炬之紅凰飛之鳴鏘鏘子孫逢吉桃夭之花灼灼家室具宜某猥以賤工獲覩盛事輒陳韻語以相歡悰天喚風雷落詔黃身披雲錦護天章日隨漢使旌旗暖路入韓城草木香即上星辰扶北極先持衣鉢付東廂不知今夕端何夕且向梅花頓舉觴代漕使宴賀帥平蠻轉官樂語玉帳分弓塵靜猩鼯之野芝泥塗檢天垂雨露之恩歡聲四滿于坤維雅集聿諧于需宴某官回天雅望命世真儒朱邸談經接英遊于綺皓紫荷持槖聨禁路于嚴徐從容鵷鷺之班密勿雲龍之會適西陲之凋瘵勤北闕之顧憂乃輟兩宫之信臣以為四蜀之司命錦城春暖仁函井絡之區雪嶺風髙威憺蓬婆之外屬有種羌之變不逃英略之神役不淹時算無遺䇿爰拜璽書之賜晉升元士之班寵光飛下于雲霄和氣旁行于田里徒得君重耳是膺進律之榮無以公歸兮即有告庭之拜都運判院近帥牙而弭節參王事以同寅欣聞盛事之鼎來深激抃悰而不寐肆陳俎豆以欵麾幢燭搖千炬之紅酒運百艘之緑舞袖低回于急雪歌聲上遏于行雲二人之利斷金固應久要三陽之征連茹會且同升某等猥以伶倫獲詹筵秩輒陳善頌以相賀悰紫槖仙人雲錦裳碧油幢下受降羌三邉外掃煙塵靜一札中含雨露香天上即歸扶日轂樽前莫惜醉霞觴主賔情分今如許飲罷相擕入帝鄉代趙漕使進秩酢帥燕會樂語慶雲惠迹俾叨考績之勞緑蟻浮春聊酢示慈之燕肯屈十連之重來同一日之歡恭惟某官命世真儒鎮浮雅望奉雲陽之瑄玉早列甘泉之班環北極之文星更勸邇英之講仍厚偉冠之眷盍參命衮之榮偶坤維謀帥之難膺巽命幹方之任三年于此四履宜之雪嶺界天徒得君重耳雲臺拂日無以公歸兮比傳速置之音曲遂借留之願油幢風動如曩年開府之初寶庋雲連在列辟彯纓之上小駐期年之逸躅即抒揆路之逺猷都運某官頃駕星軺來親玉帳遷官一列偶應考功試吏之科託庇萬間允賴含垢匿瑕之賜贊善矧蒙于髙會視儀爰秩于初筵萃千指以調絃諧五音而度曲霓裳疊月清音上薄于行雲羅襪凌波麗舞低回于急雪瓊艘運緑寶炬搖紅細聆玉應金舂有懷畢吐直至參橫斗轉不醉無歸藐是伶官陳時韻語星軺夜落錦江邉萬里來依刺史天才了銓衡三考績便勤督府一金筵緑尊敬酢青田酒翠袖爭扶紫槖仙飲罷嘉賔歸底處三槐隂裹望貂蟬總使生日樂語溥仙露于金莖是鍾哲輔泛靈槎于銀漢式介遐齡肆陳秩秩之筵共致惓惓之禱恭惟某官心傳正學世濟英猷解牛之刀十九年了無肯綮負天之背九萬里莫究扶搖頃自結于主知早入儀于朝著龍墀就日蔚為鵷序之華燕寢班春出課熊轓之最旋整軺車之駕遐征井絡之區風采一新收驥電茗旗之效恩榮狎至交使星郎宿之輝當置郵傳命之時正嵩嶽降神之候非煙非霧騰瑞靄于九霄俾夀俾康沸歡聲于四路在坐衆官夙依門仭遍沐恩波皇皇者華喜適逢于初度青青子佩幸獲際于良辰潔觴豆以陳誠指松椿而示意百尊釂緑千炬搖紅皓齒清歌唱徹長生之曲繁絃暖響喚回不老之春輒陳俳者之詞以相壺中之樂丹青步武是家傳夜泛靈槎下九天才看收駒霜滿節旋觀董餉地流錢補天有譜行歸輔閲世無疆不計年飲罷鋒車趣東去座中舐鼎亦俱仙格齋四六
